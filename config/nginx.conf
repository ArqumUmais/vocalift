# ═══════════════════════════════════════════════════════════════
#  Vocalift — Nginx Production Config
#  Place at: /etc/nginx/sites-available/vocalift
#  Enable:   sudo ln -s /etc/nginx/sites-available/vocalift /etc/nginx/sites-enabled/
#  Test:     sudo nginx -t
#  Reload:   sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════

# ── Rate limiting zones ──────────────────────────────────────────
# 10 MB zone = ~160,000 IP addresses tracked
limit_req_zone  $binary_remote_addr zone=api_info:10m    rate=10r/m;
limit_req_zone  $binary_remote_addr zone=api_convert:10m rate=3r/m;
limit_req_zone  $binary_remote_addr zone=api_general:10m rate=60r/m;
limit_req_zone  $binary_remote_addr zone=static:10m      rate=30r/s;

# ── Connection limiting ──────────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Redirect HTTP → HTTPS ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Allow ACME challenge for Let's Encrypt cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS (via Certbot / Let's Encrypt) ───────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Mozilla Modern TLS config (TLS 1.3 + 1.2, strong ciphers only)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers (defence-in-depth with Flask headers) ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;

    # Hide Nginx version
    server_tokens off;

    # ── Request limits ───────────────────────────────────────────
    client_max_body_size     1k;       # API accepts JSON only — no file uploads
    client_body_timeout      10s;
    client_header_timeout    10s;
    send_timeout             120s;
    keepalive_timeout        65s;

    # Max simultaneous connections per IP
    limit_conn conn_limit 20;

    # ── Logging ──────────────────────────────────────────────────
    access_log /var/log/nginx/vocalift_access.log combined;
    error_log  /var/log/nginx/vocalift_error.log warn;

    # ── Proxy to Gunicorn ────────────────────────────────────────
    location / {
        limit_req zone=static burst=20 nodelay;

        proxy_pass         http://127.0.0.1:5555;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_buffering          off;      # needed for streaming status polls
        proxy_read_timeout       1800s;    # long for Demucs on big files
        proxy_send_timeout       60s;
        proxy_connect_timeout    10s;
    }

    # ── API-specific rate limits ──────────────────────────────────
    location /api/info {
        limit_req zone=api_info burst=5 nodelay;
        proxy_pass http://127.0.0.1:5555;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/convert {
        limit_req zone=api_convert burst=2 nodelay;
        proxy_pass http://127.0.0.1:5555;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        limit_req zone=api_general burst=30 nodelay;
        proxy_pass http://127.0.0.1:5555;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 1800s;
    }

    # ── Block common attack paths ─────────────────────────────────
    location ~* \.(env|git|sql|bak|log|conf|ini|sh)$ {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Health check (no rate limit) ─────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:5555;
        proxy_set_header Host $host;
        access_log off;
    }
}
